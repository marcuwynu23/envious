{{define "error.html"}} {{template "layout.head" .}}
<div class="rounded-2xl border border-slate-200 bg-white p-6">
  <div class="text-sm font-semibold text-slate-900">Something went wrong</div>
  <div
    class="mt-2 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
  >
    {{.Error}}
  </div>
  <div class="mt-4">
    <a href="/" class="text-sm font-semibold text-slate-700 hover:underline"
      >Back to dashboard</a
    >
  </div>
</div>
{{template "layout.foot" .}} {{end}}
