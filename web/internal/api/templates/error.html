{{define "error.html"}} {{template "layout.head" .}}
<div class="rounded-lg border border-slate-300 bg-[#f8fafc] p-6 shadow-sm">
  <div class="text-sm font-semibold text-slate-900">Something went wrong</div>
  <div
    class="mt-2 rounded-md border border-slate-400 bg-slate-100 px-4 py-3 text-sm text-slate-700"
  >
    {{.Error}}
  </div>
  <div class="mt-4">
    <a href="/" class="text-sm font-semibold text-slate-800 hover:underline"
      >Back to dashboard</a
    >
  </div>
</div>
{{template "layout.foot" .}} {{end}}
