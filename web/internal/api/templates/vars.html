{{define "vars.html"}}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Envious - {{.Env.Name}}</title>
    <style>
      body {
        font-family: Arial;
        margin: 2rem;
      }
      table {
        border-collapse: collapse;
      }
      td,
      th {
        border: 1px solid #ccc;
        padding: 0.5rem;
      }
      code {
        background: #f6f8fa;
        padding: 0.2rem 0.4rem;
      }
    </style>
  </head>
  <body>
    <a href="/apps/{{.Env.AppID}}">← Back</a>
    <h1>Environment: {{.Env.Name}}</h1>
    <table>
      <tr>
        <th>Key</th>
        <th>Value</th>
        <th>Version</th>
        <th>Actions</th>
      </tr>
      {{range .Vars}}
      <tr>
        <td><code>{{.Key}}</code></td>
        <td><code>{{.Value}}</code></td>
        <td>{{.Version}}</td>
        <td>
          <form
            method="post"
            action="/apps/{{$.Env.AppID}}/envs/{{$.Env.ID}}/vars/{{.Key}}/delete"
            style="display: inline"
          >
            <button type="submit" onclick="return confirm('Delete variable?');">
              Delete
            </button>
          </form>
        </td>
      </tr>
      {{end}}
    </table>
    <h2>Add / Update Variable</h2>
    <form method="post" action="/apps/{{.Env.AppID}}/envs/{{.Env.ID}}/vars">
      <input name="key" placeholder="KEY" />
      <input name="value" placeholder="value" />
      <button type="submit">Save</button>
    </form>
  </body>
</html>
{{end}}
