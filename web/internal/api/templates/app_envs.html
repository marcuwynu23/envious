{{define "app_envs.html"}} {{template "layout.head" .}}
<div class="flex items-center justify-between gap-4">
  <div>
    <div class="text-sm text-slate-500">
      <a class="hover:underline" href="/">Applications</a>
      <span class="mx-1">/</span>
      {{.App.Name}}
    </div>
    <h1 class="mt-1 text-lg font-semibold">Environments</h1>
    <p class="mt-1 text-sm text-slate-600">
      Create and manage environments for this application.
    </p>
  </div>
  <div class="hidden sm:block text-sm text-slate-500">
    App ID: <span class="font-mono">{{.App.ID}}</span>
  </div>
</div>

<div class="mt-6 rounded-2xl border border-slate-200 bg-white overflow-hidden">
  <div
    class="flex flex-wrap items-center gap-3 border-b border-slate-200 bg-slate-50 p-4"
  >
    <form
      method="post"
      action="/apps/{{.App.ID}}/envs"
      class="flex flex-1 flex-wrap items-center gap-3"
    >
      <input
        name="name"
        placeholder="New environment (e.g. dev, staging, prod)"
        class="min-w-[240px] flex-1 rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none focus:border-sky-400 focus:ring-4 focus:ring-sky-200"
      />
      <button
        type="submit"
        class="rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800"
      >
        Create
      </button>
    </form>
  </div>

  <div class="overflow-x-auto">
    <table class="min-w-full">
      <thead>
        <tr
          class="text-left text-xs font-semibold uppercase tracking-wider text-slate-500"
        >
          <th class="px-4 py-3">ID</th>
          <th class="px-4 py-3">Name</th>
          <th class="px-4 py-3 text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        {{range .Envs}}
        <tr class="hover:bg-slate-50">
          <td class="px-4 py-3 text-sm text-slate-500">{{.ID}}</td>
          <td class="px-4 py-3 text-sm">
            <a
              href="/apps/{{$.App.ID}}/envs/{{.ID}}"
              class="font-semibold text-slate-900 hover:underline"
              >{{.Name}}</a
            >
          </td>
          <td class="px-4 py-3 text-right">
            <form
              method="post"
              action="/apps/{{$.App.ID}}/envs/{{.ID}}/delete"
              class="inline"
            >
              <button
                type="submit"
                class="rounded-xl border border-red-200 bg-white px-3 py-1.5 text-sm font-semibold text-red-700 hover:bg-red-50"
                onclick="return confirm('Delete environment?');"
              >
                Delete
              </button>
            </form>
          </td>
        </tr>
        {{end}}
      </tbody>
    </table>
  </div>
</div>
{{template "layout.foot" .}} {{end}}
