{{define "apps.html"}} {{template "layout.head" .}}

<!-- PAGE HEADER -->
<div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4">
  <div>
    <h1 class="text-xl font-semibold tracking-tight text-slate-900">
      Applications
    </h1>
    <p class="mt-1 text-sm text-slate-500">
      Select an application to manage its environments and variables.
    </p>
  </div>
</div>

<!-- APPLICATIONS CARD -->
<div class="mt-2 rounded-lg overflow-hidden">
  <!-- CREATE FORM -->
  <div class="flex flex-wrap items-center justify-end gap-3 p-4">
    <form
      method="post"
      action="/apps"
      class="flex flex-wrap items-center gap-3"
      data-confirm="Create this application?"
      data-confirm-ok="Create"
    >
      <input
        name="name"
        placeholder="New application name (e.g. billing-service)"
        class="w-[320px] rounded-md border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-[#ab3838] focus:ring-2 focus:ring-[#f3c1c1]"
      />
      <button
        type="submit"
        class="rounded-md bg-gradient-to-r from-[#c94848] to-[#ab3838] px-4 py-2 text-sm font-medium text-white shadow-sm hover:from-[#b33c3c] hover:to-[#8f2e2e] transition"
      >
        Create
      </button>
    </form>
  </div>

  <!-- APPLICATIONS LIST -->
  <div class="grid grid-cols-1 gap-3 p-4 md:grid-cols-2 xl:grid-cols-3">
    {{range .Apps}}
    <div
      class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm transition hover:border-slate-300 hover:shadow"
    >
      <div
        class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"
      >
        <div class="min-w-0">
          <p class="text-xs uppercase tracking-wide text-slate-500">#{{.ID}}</p>
          <span class="mt-1 block truncate text-sm font-semibold text-slate-900"
            >{{.Name}}</span
          >
        </div>
        <div class="sm:shrink-0 flex items-center gap-2">
          <a
            href="/apps/{{.ID}}"
            class="rounded-md border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 shadow-sm hover:bg-slate-50 transition"
            >Open</a
          >
          {{if ne .ID 1}}
          <form
            method="post"
            action="/apps/{{.ID}}/delete"
            class="inline"
            data-confirm="Delete application?"
            data-confirm-ok="Delete"
          >
            <button
              type="submit"
              class="rounded-md bg-gradient-to-r from-[#c94848] to-[#ab3838] px-3 py-1.5 text-xs font-medium text-white shadow-sm hover:from-[#b33c3c] hover:to-[#8f2e2e] transition"
            >
              Delete
            </button>
          </form>
          {{end}}
        </div>
      </div>
    </div>
    {{end}}
  </div>
</div>

{{template "layout.foot" .}} {{end}}
