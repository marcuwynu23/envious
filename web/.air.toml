# Air configuration for golang-web-mvc-project-template

root = "."
tmp_dir = "tmp"

[build]
# Build the server binary
cmd = "go build -o tmp\\envious-server.exe ./cmd/server"
bin = "tmp\\envious-server.exe"
full_bin = "tmp\\envious-server.exe"

# Watch for changes in these directories
include_dir = ["cmd", "internal", "internal/api/templates"]

# Ignore generated / dependency dirs
exclude_dir = ["tmp", "build", "dist", "tests", "vendor", ".git"]

include_ext = ["go", "tpl", "tmpl", "html"]
exclude_ext = ["swp", "tmp"]

delay = 1000 # ms

[log]
time = true

[color]
main = "yellow"
watcher = "cyan"
build = "green"
runner = "magenta"

[misc]
clean_on_exit = true

